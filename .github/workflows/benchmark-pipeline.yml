name: CTA Benchmark Pipeline

on:
  schedule:
    - cron: "0 22 * * 1-5"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pandas yfinance plotly lxml html5lib

      - name: Run pipeline
        run: python pipeline_runner.py

      - name: Commit data CSVs
        run: |
          git config user.email "pipeline@triaxiom-dashboard"
          git config user.name "Benchmark Pipeline"
          git add data/*.csv data/*.json || true
          git diff --staged --quiet || git commit -m "chore: update benchmark data $(date -u +%Y-%m-%d)"
          git push || echo "Nothing to push"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
